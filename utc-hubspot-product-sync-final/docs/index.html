<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UTC - HubSpot Product Sync</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a2e; color: #e0e0e0; }
    .card { text-align: center; padding: 2rem; max-width: 600px; }
    h1 { font-size: 1.2rem; font-weight: 500; }
    p { color: #888; font-size: 0.9rem; }
    .code { background: #2a2a4a; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 1.1rem; word-break: break-all; color: #4ade80; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>UTC — HubSpot Product Sync</h1>
    <div id="content">
      <p>This app runs as a nightly background sync. No UI needed.</p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    if (code) {
      document.getElementById('content').innerHTML = 
        '<p>Authorization code received! Copy this and paste it to Claude:</p>' +
        '<div class="code">' + code + '</div>';
    }
  </script>
</body>
</html>
