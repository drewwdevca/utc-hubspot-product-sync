name: Shopify to HubSpot Product Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check required secrets exist
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          [ -n "$SHOPIFY_ACCESS_TOKEN" ] || (echo "Missing SHOPIFY_ACCESS_TOKEN" && exit 1)
          [ -n "$HUBSPOT_TOKEN" ] || (echo "Missing HUBSPOT_TOKEN" && exit 1)
          echo "Required secrets are present"

      - name: Run sync
        env:
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: node sync.js
